<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap');

    :root {
        --bg-main: #e2e8f0; 
        --text-main: #0f172a;
        --text-muted: #64748b;
        
        --primary: #6366f1;
        --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        --accent: #14b8a6;
        --card-bg: rgba(255, 255, 255, 0.85); 
        --border-color: rgba(226, 232, 240, 0.8);
        --radius-lg: 14px;
        --radius-xl: 20px;
        
        --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
        background-color: var(--bg-main);
        background-image: 
            radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.15) 0px, transparent 50%),
            linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px), 
            linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        position: relative;
    }

    body::before, body::after {
        content: "";
        position: fixed;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        z-index: -1;
        pointer-events: none;
    }

    body::before { 
        top: -10%; 
        left: -10%; 
        background: rgba(99, 102, 241, 0.25); 
        filter: blur(100px); 
    }

    body::after { 
        bottom: -10%; 
        right: -10%; 
        background: rgba(20, 184, 166, 0.22); 
        filter: blur(120px); 
    }

    .container {
        max-width: 1140px;
        margin: 0 auto;
        padding: 3rem 1.5rem;
        position: relative;
        z-index: 1;
    }

    .header-area {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1.5rem;
        margin-bottom: 3rem;
    }

    @media (min-width: 768px) {
        .header-area {
            flex-direction: row;
            align-items: center;
        }
    }

    .header-title h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 2.6rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(to right, #0f172a, #312e81);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0 0 0.5rem 0;
    }

    .header-title p {
        color: var(--text-muted);
        margin: 0;
        font-size: 1rem;
        font-weight: 500;
    }

    .stats-box {
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 1.25rem 1.75rem;
        border-radius: var(--radius-xl);
        border: 1px solid var(--border-color);
        display: flex;
        gap: 2rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .stat-item {
        display: flex;
        flex-direction: column;
    }

    .stat-item:not(:first-child) {
        border-left: 2px solid rgba(15, 23, 42, 0.08);
        padding-left: 2rem;
    }

    .stat-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
    }

    .stat-value {
        font-family: 'Outfit', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
    }

    .stat-value.total { color: var(--primary); }
    .stat-value.height { color: var(--accent); }

    .controls-panel {
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 1.25rem;
        border-radius: var(--radius-xl);
        border: 1px solid var(--border-color);
        margin-bottom: 2.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    @media (min-width: 768px) {
        .controls-panel {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
    }

    .search-wrapper {
        position: relative;
        width: 100%;
    }

    @media (min-width: 768px) {
        .search-wrapper { width: 320px; }
    }

    .search-wrapper i {
        position: absolute;
        left: 1.1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
    }

    .search-input {
        width: 100%;
        padding: 0.75rem 1.25rem 0.75rem 2.75rem;
        background-color: rgba(248, 250, 252, 0.8);
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: var(--radius-lg);
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text-main);
        box-sizing: border-box;
        transition: var(--transition);
    }

    .search-input:focus {
        outline: none;
        background-color: #ffffff;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .sort-group {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .sort-label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-right: 0.5rem;
    }

    .btn-sort {
        padding: 0.7rem 1.25rem;
        background-color: #ffffff;
        color: var(--text-main);
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: var(--radius-lg);
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: var(--transition);
    }

    .btn-sort:hover {
        background-color: #f8fafc;
        border-color: #cbd5e1;
        transform: translateY(-1px);
    }

    .btn-sort.active {
        background: var(--primary-gradient);
        color: #ffffff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .students-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.75rem;
    }

    @media (min-width: 640px) {
        .students-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1024px) {
        .students-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .student-card {
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: var(--radius-xl);
        padding: 1.75rem;
        box-shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.04);
        position: relative;
        overflow: hidden;
        transition: var(--transition);
    }

    .student-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--primary-gradient);
        opacity: 0;
        transition: var(--transition);
    }

    .student-card:hover {
        transform: translateY(-6px);
        border-color: rgba(99, 102, 241, 0.2);
        box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.05), 0 10px 10px -5px rgba(99, 102, 241, 0.03);
    }

    .student-card:hover::before { opacity: 1; }

    .card-header {
        display: flex;
        align-items: center;
        gap: 1.25rem;
    }

    .avatar-container {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        overflow: hidden;
        position: relative;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        border: 2px solid #ffffff;
        background-color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
    }

    .student-card:hover .avatar-container { transform: scale(1.08) rotate(2deg); }
    .student-card.male:hover .avatar-container { border-color: #3b82f6; }
    .student-card.female:hover .avatar-container { border-color: #ec4899; }

    .student-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .student-info h3 {
        margin: 0 0 0.35rem 0;
        font-family: 'Outfit', sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        color: #1e293b;
        transition: var(--transition);
    }

    .student-card:hover .student-info h3 { color: var(--primary); }

    .badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        background-color: rgba(15, 23, 42, 0.05);
        color: #475569;
        border-radius: 8px;
        font-size: 0.75rem;
        font-weight: 600;
    }

    .card-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 1.75rem;
        padding-top: 1.25rem;
        border-top: 1px solid rgba(15, 23, 42, 0.06);
    }

    .card-stat-box {
        background-color: #f8fafc;
        padding: 0.85rem;
        border-radius: var(--radius-lg);
        text-align: center;
        border: 1px solid transparent;
        transition: var(--transition);
    }

    .student-card:hover .card-stat-box {
        background-color: #ffffff;
        border-color: #f1f5f9;
    }

    .card-stat-label {
        display: block;
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin-bottom: 0.35rem;
    }

    .card-stat-value {
        font-family: 'Outfit', sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        color: #334155;
    }

    .card-stat-value.height-val { color: var(--accent); }

    .no-data {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem;
        color: var(--text-muted);
        font-weight: 500;
    }

    .btn-chat-student {
        width: 100%;
        margin-top: 1.25rem;
        padding: 0.7rem;
        background: var(--primary-gradient);
        color: white;
        border: none;
        border-radius: var(--radius-lg);
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        transition: var(--transition);
    }

    .btn-chat-student:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .ai-chat-window {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        width: 360px;
        height: 480px;
        background: white;
        border-radius: var(--radius-xl);
        border: 1px solid #cbd5e1;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.15);
        z-index: 1000;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transform: translateY(20px) scale(0.95);
        opacity: 0;
        pointer-events: none;
        transition: var(--transition);
    }

    .ai-chat-window.open {
        transform: translateY(0) scale(1);
        opacity: 1;
        pointer-events: auto;
    }

    .chat-header {
        background: var(--primary-gradient);
        color: white;
        padding: 1rem 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chat-header h4 {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .chat-header button {
        background: transparent;
        border: none;
        color: white;
        font-size: 1.1rem;
        cursor: pointer;
        opacity: 0.8;
        transition: var(--transition);
    }

    .chat-header button:hover { opacity: 1; }

    .chat-messages {
        flex: 1;
        padding: 1.25rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        background: #f8fafc;
    }

    .msg {
        max-width: 80%;
        padding: 0.65rem 0.9rem;
        border-radius: 14px;
        font-size: 0.85rem;
        line-height: 1.4;
    }

    .msg.user {
        background: #e2e8f0;
        color: var(--text-main);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }

    .msg.ai {
        background: #e0e7ff;
        color: #4f46e5;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }

    .chat-footer {
        padding: 0.75rem 1rem;
        border-top: 1px solid #e2e8f0;
        display: flex;
        gap: 0.5rem;
        background: white;
    }

    .chat-footer input {
        flex: 1;
        border: 1px solid #cbd5e1;
        padding: 0.6rem 0.9rem;
        border-radius: var(--radius-lg);
        font-size: 0.85rem;
        outline: none;
        transition: var(--transition);
    }

    .chat-footer input:focus { border-color: var(--primary); }

    .chat-footer button {
        background: var(--primary-gradient);
        color: white;
        border: none;
        padding: 0.6rem 1rem;
        border-radius: var(--radius-lg);
        cursor: pointer;
        transition: var(--transition);
    }

    .chat-footer button:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }
</style>

<div class="container">
    <div class="header-area">
        <div class="header-title">
            <h1>Triedna Databáza</h1>
            <p>Prehľad žiakov, ich veku, výšky a individuálny AI chat</p>
        </div>
        <div class="stats-box">
            <div class="stat-item">
                <span class="stat-label">Celkovo žiakov</span>
                <span class="stat-value total" id="totalStudents">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Priemerná výška</span>
                <span class="stat-value height" id="avgHeight">0 cm</span>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Hľadať žiaka podľa mena...">
        </div>
        <div class="sort-group">
            <span class="sort-label">Zoradiť podľa:</span>
            <button class="btn-sort active" id="sortName">Mena</button>
            <button class="btn-sort" id="sortAge">Veku</button>
            <button class="btn-sort" id="sortHeight">Výšky</button>
        </div>
    </div>

    <div class="students-grid" id="studentsGrid">
    </div>
</div>

<div class="ai-chat-window" id="chatWindow">
    <div class="chat-header">
        <h4><i class="fas fa-user"></i> Chat</h4>
        <button id="closeChat"><i class="fas fa-times"></i></button>
    </div>
    <div class="chat-messages" id="chatMessages">
    </div>
    <div class="chat-footer">
        <input type="text" id="chatInput" placeholder="Napíš správu...">
        <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    let allStudents = [];
    let currentSort = 'name';
    let activeStudent = null;

    const studentsGrid = document.getElementById('studentsGrid');
    const totalStudentsEl = document.getElementById('totalStudents');
    const avgHeightEl = document.getElementById('avgHeight');
    const searchInput = document.getElementById('searchInput');

    const chatWindow = document.getElementById('chatWindow');
    const closeChat = document.getElementById('closeChat');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');
    const chatMessages = document.getElementById('chatMessages');
    const chatHeaderTitle = document.querySelector('.chat-header h4');

    async function fetchStudents() {
        try {
            const response = await fetch(`/students?sort=${currentSort}`);
            allStudents = await response.json();
            updateStats();
            renderStudents(allStudents);
        } catch (error) {
            console.error("Chyba:", error);
            studentsGrid.innerHTML = '<div class="no-data">Chyba načítania dát.</div>';
        }
    }

    function renderStudents(studentsList) {
        studentsGrid.innerHTML = '';
        studentsList.forEach(student => {
            const isFemale = student.name.trim().endsWith('á') || student.name.trim().endsWith('ová') || student.name.trim().includes('vá');
            const genderClass = isFemale ? 'female' : 'male';
            
            const imgUrl = `https://loremflickr.com/1200/800/portrait`;

            const card = document.createElement('div');
            card.className = `student-card ${genderClass}`;
            card.innerHTML = `
                <div class="card-header">
                    <div class="avatar-container">
                        <img src="${imgUrl}" class="student-img" alt="${student.name}">
                    </div>
                    <div class="student-info">
                        <h3>${student.name}</h3>
                        <span class="badge">ID: #${student.id}</span>
                    </div>
                </div>
                <div class="card-stats">
                    <div class="card-stat-box">
                        <span class="card-stat-label">Vek</span>
                        <span class="card-stat-value">${student.age} rokov</span>
                    </div>
                    <div class="card-stat-box">
                        <span class="card-stat-label">Výška</span>
                        <span class="card-stat-value height-val">${student.vyska} cm</span>
                    </div>
                </div>
                <button class="btn-chat-student">
                    <i class="fas fa-comment"></i> Napísať správu
                </button>
            `;

            card.querySelector('.btn-chat-student').addEventListener('click', () => {
                activeStudent = student;
                chatHeaderTitle.innerHTML = `<i class="fas fa-user"></i> Chat: ${student.name}`;
                chatMessages.innerHTML = `<div class="msg ai">Ahoj! Ja som ${student.name}. Pokecáme? 😊</div>`;
                
                chatWindow.classList.add('open'); 
                chatInput.focus();
            });

            studentsGrid.appendChild(card);
        });
    }

    closeChat.addEventListener('click', () => {
        chatWindow.classList.remove('open');
        activeStudent = null;
    });

    async function handleSendMessage() {
        const text = chatInput.value.trim();
        if (!text || !activeStudent) return;

        appendMessage(text, 'user');
        chatInput.value = '';

        const loadingId = appendMessage('Píše...', 'ai');

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    student_info: activeStudent 
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).innerText = data.response;

        } catch (error) {
            document.getElementById(loadingId).innerText = "Uups, neodpovedá. Skús to znova!";
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        const uniqueId = 'msg-' + Date.now();
        msgDiv.id = uniqueId;
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerText = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return uniqueId;
    }

    function updateStats() {
        if (allStudents.length === 0) return;
        totalStudentsEl.innerText = allStudents.length;
        const sumHeight = allStudents.reduce((sum, s) => sum + s.vyska, 0);
        const avgHeight = Math.round(sumHeight / allStudents.length);
        avgHeightEl.innerText = `${avgHeight} cm`;
    }

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const filtered = allStudents.filter(student => student.name.toLowerCase().includes(query));
        renderStudents(filtered);
    });

    function setActiveSortBtn(activeBtnId) {
        ['sortName', 'sortAge', 'sortHeight'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(activeBtnId).classList.add('active');
    }

    document.getElementById('sortName').addEventListener('click', () => { currentSort = 'name'; setActiveSortBtn('sortName'); fetchStudents(); });
    document.getElementById('sortAge').addEventListener('click', () => { currentSort = 'age'; setActiveSortBtn('sortAge'); fetchStudents(); });
    document.getElementById('sortHeight').addEventListener('click', () => { currentSort = 'vyska'; setActiveSortBtn('sortHeight'); fetchStudents(); });

    sendChatBtn.addEventListener('click', handleSendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleSendMessage();
        }
    });

    fetchStudents();
</script>
